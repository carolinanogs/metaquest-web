<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">Tela de login do MetaQuest</title>
  <desc id="desc">Tela mobile de login com formulário de e-mail e senha.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#312e81" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="390" height="844" rx="34" fill="url(#bg)"/>
  <circle cx="318" cy="76" r="88" fill="#c7d2fe" opacity=".35"/>
  <circle cx="54" cy="748" r="118" fill="#bfdbfe" opacity=".28"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(32 88)">
      <rect x="0" y="0" width="326" height="640" rx="28" fill="#fff" filter="url(#shadow)"/>
      <circle cx="163" cy="78" r="34" fill="url(#brand)"/>
      <path d="M151 77l8 8 18-22" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="163" y="145" text-anchor="middle" font-size="27" font-weight="800" fill="#0f172a">Bem-vindo de volta</text>
      <text x="163" y="176" text-anchor="middle" font-size="14" fill="#64748b">Entre para continuar evoluindo suas metas.</text>
      <text x="28" y="237" font-size="13" font-weight="700" fill="#334155">E-mail</text>
      <rect x="28" y="251" width="270" height="52" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="46" y="284" font-size="15" fill="#94a3b8">carol@metaquest.dev</text>
      <text x="28" y="336" font-size="13" font-weight="700" fill="#334155">Senha</text>
      <rect x="28" y="350" width="270" height="52" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="46" y="383" font-size="18" letter-spacing="2" fill="#94a3b8">••••••••</text>
      <text x="298" y="427" text-anchor="end" font-size="13" font-weight="700" fill="#4f46e5">Esqueci a senha</text>
      <rect x="28" y="462" width="270" height="54" rx="15" fill="url(#brand)"/>
      <text x="163" y="496" text-anchor="middle" font-size="16" font-weight="800" fill="#fff">Entrar</text>
      <line x1="28" y1="562" x2="298" y2="562" stroke="#e2e8f0"/>
      <text x="163" y="596" text-anchor="middle" font-size="14" fill="#64748b">Ainda nao tem conta?</text>
      <text x="163" y="624" text-anchor="middle" font-size="15" font-weight="800" fill="#4f46e5">Criar conta</text>
    </g>
  </g>
</svg>
