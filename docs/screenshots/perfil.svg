<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">Tela de perfil do MetaQuest</title>
  <desc id="desc">Tela mobile de perfil com dados do usuário, estatísticas e top categorias.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="avatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="16" y="58" font-size="25" font-weight="900" fill="#0f172a">Perfil</text>
