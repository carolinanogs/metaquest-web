    <text x="318" y="263" text-anchor="middle" font-size="25" font-weight="900" fill="#0f172a">5</text>
    <text x="318" y="286" text-anchor="middle" font-size="11" fill="#64748b">Metas</text>

    <text x="16" y="361" font-size="12" font-weight="850" fill="#64748b">TOP CATEGORIAS</text>
    <rect x="16" y="376" width="358" height="62" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="48" cy="407" r="15" fill="#dbeafe"/>
    <text x="80" y="413" font-size="15" font-weight="800" fill="#334155">Profissional</text>
    <text x="338" y="413" text-anchor="end" font-size="13" font-weight="850" fill="#4f46e5">5 concluidas</text>
    <rect x="16" y="450" width="358" height="62" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="48" cy="481" r="15" fill="#e0e7ff"/>
    <text x="80" y="487" font-size="15" font-weight="800" fill="#334155">Estudos</text>
    <text x="338" y="487" text-anchor="end" font-size="13" font-weight="850" fill="#4f46e5">4 concluidas</text>
    <rect x="16" y="524" width="358" height="62" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="48" cy="555" r="15" fill="#fce7f3"/>
