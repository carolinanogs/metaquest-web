<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">Tela de conquistas do MetaQuest</title>
  <desc id="desc">Tela mobile com progresso de nível, métricas, medalhas e histórico.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="16" y="58" font-size="25" font-weight="900" fill="#0f172a">Conquistas</text>
    <rect x="16" y="82" width="358" height="142" rx="24" fill="url(#brand)"/>
    <text x="38" y="122" font-size="14" font-weight="700" fill="#c7d2fe">Nivel 4</text>
    <text x="38" y="157" font-size="26" font-weight="850" fill="#fff">Carol</text>
    <text x="38" y="185" font-size="14" fill="#e0e7ff">680 XP acumulados</text>
    <rect x="38" y="199" width="292" height="10" rx="5" fill="#4338ca" opacity=".65"/>
    <rect x="38" y="199" width="198" height="10" rx="5" fill="#fff"/>

    <rect x="16" y="240" width="108" height="80" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <text x="70" y="275" text-anchor="middle" font-size="25" font-weight="900" fill="#0f172a">3</text>
    <text x="70" y="298" text-anchor="middle" font-size="11" fill="#64748b">Conquistas</text>
    <rect x="141" y="240" width="108" height="80" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <text x="195" y="275" text-anchor="middle" font-size="25" font-weight="900" fill="#0f172a">18</text>
    <text x="195" y="298" text-anchor="middle" font-size="11" fill="#64748b">Metas feitas</text>
    <rect x="266" y="240" width="108" height="80" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <text x="320" y="275" text-anchor="middle" font-size="14" font-weight="900" fill="#4f46e5">Aventureiro</text>
    <text x="320" y="298" text-anchor="middle" font-size="11" fill="#64748b">Status</text>

    <text x="16" y="363" font-size="12" font-weight="850" fill="#64748b">MEDALHAS</text>
    <rect x="16" y="377" width="358" height="66" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="50" cy="410" r="19" fill="#fef3c7"/>
    <text x="50" y="418" text-anchor="middle" font-size="22">🏆</text>
    <text x="82" y="404" font-size="15" font-weight="850" fill="#0f172a">Primeira Meta</text>
    <text x="82" y="425" font-size="12" fill="#64748b">Concluiu sua primeira meta</text>
    <text x="339" y="416" text-anchor="middle" font-size="12" font-weight="800" fill="#16a34a">OK</text>
    <rect x="16" y="454" width="358" height="66" rx="18" fill="#fff" stroke="#e2e8f0"/>
    <circle cx="50" cy="487" r="19" fill="#ffedd5"/>
    <text x="50" y="495" text-anchor="middle" font-size="22">🔥</text>
    <text x="82" y="481" font-size="15" font-weight="850" fill="#0f172a">7 dias seguidos</text>
    <text x="82" y="502" font-size="12" fill="#64748b">Manteve uma streak de 7 dias</text>
    <text x="339" y="493" text-anchor="middle" font-size="12" font-weight="800" fill="#16a34a">OK</text>
    <rect x="16" y="531" width="358" height="66" rx="18" fill="#fff" stroke="#e2e8f0" opacity=".72"/>
    <circle cx="50" cy="564" r="19" fill="#f1f5f9"/>
    <text x="50" y="572" text-anchor="middle" font-size="22">🔒</text>
    <text x="82" y="558" font-size="15" font-weight="850" fill="#475569">30 dias seguidos</text>
    <text x="82" y="579" font-size="12" fill="#94a3b8">Mantenha a sequencia ativa</text>

    <text x="16" y="640" font-size="12" font-weight="850" fill="#64748b">HISTORICO</text>
    <rect x="16" y="654" width="358" height="54" rx="16" fill="#fff" stroke="#e2e8f0"/>
    <text x="32" y="685" font-size="14" font-weight="800" fill="#0f172a">Organizar financas do mes</text>
    <text x="327" y="685" text-anchor="middle" font-size="12" font-weight="800" fill="#059669">+25 XP</text>

    <rect x="0" y="764" width="390" height="80" fill="#fff" stroke="#e2e8f0"/>
    <text x="54" y="812" text-anchor="middle" font-size="12" fill="#64748b">Inicio</text>
    <text x="142" y="812" text-anchor="middle" font-size="12" fill="#64748b">Metas</text>
    <text x="247" y="812" text-anchor="middle" font-size="12" font-weight="800" fill="#4f46e5">Conquistas</text>
    <text x="337" y="812" text-anchor="middle" font-size="12" fill="#64748b">Perfil</text>
  </g>
</svg>
